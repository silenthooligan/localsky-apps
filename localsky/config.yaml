# LocalSky app manifest.
# version must match the published app image tag (ghcr.io/silenthooligan/
# localsky-haos), which wraps the same-version upstream LocalSky release.
# New release flow: run the publish-image workflow with the new version,
# then bump version here and in Dockerfile's BASE_VERSION default.
name: LocalSky
version: "0.3.0-beta.2"
image: ghcr.io/silenthooligan/localsky-haos
slug: localsky
description: Local-first weather hub and smart irrigation engine (Tempest, Ecowitt, OpenSprinkler)
url: https://github.com/silenthooligan/localsky
arch:
  - aarch64
  - amd64
# Start before Home Assistant Core so the LocalSky integration finds a
# running server when it loads.
startup: services
boot: auto
# Host networking is required: the Tempest station broadcasts on UDP 50222,
# Ecowitt gateways live on the LAN, and LocalSky announces itself over mDNS
# for integration discovery. The web UI binds port 8090.
host_network: true
# Supervisor proxy access: lets LocalSky talk to the Home Assistant API
# (device import, entity blending) without a long-lived token.
homeassistant_api: true
# Stop during backups so the SQLite history database is captured consistently.
backup: cold
webui: http://[HOST]:[PORT:8090]/
watchdog: http://[HOST]:[PORT:8090]/api/v1/info
options:
  home_assistant: true
  log_level: info
schema:
  home_assistant: bool
  log_level: list(error|warn|info|debug|trace)
