# Builds the prebuilt multi-arch app image (wrapper over the released
# LocalSky image) and pushes it to GHCR. Run this when a new LocalSky
# version ships, then bump `version` in localsky/config.yaml to match.
name: publish-image

on:
  workflow_dispatch:
    inputs:
      version:
        description: "LocalSky release tag to wrap (also becomes the app image tag)"
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./localsky
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            BASE_VERSION=${{ inputs.version }}
          tags: |
            ghcr.io/silenthooligan/localsky-haos:${{ inputs.version }}
            ghcr.io/silenthooligan/localsky-haos:latest
